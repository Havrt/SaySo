<!DOCTYPE html>
<html lang="en">
<head>
    <title>SaySo | Online Voting</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a1f3c;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* --- Landing: two panels side by side --- */
        #landing {
            display: flex;
            gap: 0;
            width: 100%;
            max-width: 780px;
            background: #1e2444;
            border-radius: 16px;
            overflow: hidden;
        }

        .panel {
            flex: 1;
            padding: 32px 28px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .panel h2 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #9fa8da;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        #panel-divider {
            width: 1px;
            background: #2e3566;
            margin: 24px 0;
        }

        /* --- Shared inputs --- */
        .panel input {
            padding: 13px 16px;
            border-radius: 8px;
            border: 2px solid #2e3566;
            background: #252b50;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        .panel input:focus {
            border-color: #673ab7;
        }

        .panel input::placeholder {
            color: #7986cb;
        }

        .btn-primary {
            padding: 13px;
            background: #673ab7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s;
            width: 100%;
        }

        .btn-primary:hover { background: #7e57c2; }

        /* --- Add candidate row --- */
        .add-row {
            display: flex;
            gap: 8px;
        }

        .add-row input { flex: 1; }

        .btn-add {
            padding: 13px 16px;
            background: #00b0ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .btn-add:hover { background: #29b6f6; }

        /* --- Candidate preview list --- */
        #candidate-preview {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .preview-item {
            background: #252b50;
            border-radius: 6px;
            padding: 9px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .preview-item button {
            background: none;
            border: none;
            color: #f44336;
            font-size: 1rem;
            cursor: pointer;
            padding: 0 2px;
        }

        /* --- Lobby info (replaces setup panel after start) --- */
        #lobby-div {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            text-align: center;
        }

        .pin-label {
            font-size: 0.8rem;
            color: #7986cb;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .pin-display {
            background: #252b50;
            border: 2px solid #673ab7;
            border-radius: 10px;
            padding: 18px 36px;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 6px;
            color: #e040fb;
        }

        /* --- Feedback --- */
        #feedback {
            min-height: 28px;
            font-size: 1rem;
            font-weight: bold;
            margin: 16px 0;
            letter-spacing: 0.5px;
        }

        .feedback-success { color: #00c853; }
        .feedback-error   { color: #f44336; }

        /* --- Candidate Grid --- */
        #candidate-list {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
            max-width: 680px;
        }

        .tile {
            padding: 48px 20px;
            border-radius: 12px;
            border: none;
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: transform 0.1s, filter 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tile:hover { transform: scale(1.03); filter: brightness(1.1); }
        .tile:active { transform: scale(0.97); }

        .tile:nth-child(1) { background: #00c853; }
        .tile:nth-child(2) { background: #00b0ff; }
        .tile:nth-child(3) { background: #ff6d00; }
        .tile:nth-child(4) { background: #e040fb; }

        .vote-count {
            font-size: 0.95rem;
            font-weight: 500;
            opacity: 0.9;
            text-transform: none;
            letter-spacing: 0;
        }

        /* --- Undo Button --- */
        #undo-btn {
            display: none;
            background: #37474f;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 36px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 24px;
            letter-spacing: 1px;
            transition: background 0.2s;
        }

        #undo-btn:hover { background: #455a64; }

        /* --- Reset Button --- */
        .btn-reset {
            padding: 10px 20px;
            background: none;
            color: #f44336;
            border: 2px solid #f44336;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s, color 0.2s;
            width: 100%;
        }

        .btn-reset:hover {
            background: #f44336;
            color: white;
        }

        /* --- Minimal additions --- */
        #results-btn {
            display: none;
            background: #5c6bc0;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 36px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
            letter-spacing: 1px;
        }

        #results-output {
            margin-top: 16px;
            text-align: center;
            line-height: 1.8;
        }

        #timer {
            display: none;
            margin-top: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffd54f;
        }
    </style>
</head>
<body>
    <h1>SaySo</h1>

    <!-- LANDING: host setup + voter registration side by side -->
    <div id="landing">

        <!-- LEFT: Host Setup -->
        <div class="panel" id="setup-div">
            <h2>Host Setup</h2>
            <input type="password" id="setup-pin" placeholder="Set a Session PIN">
            <div class="add-row">
                <input type="text" id="candidate-name-input" placeholder="Candidate name"
                    onkeydown="if(event.key==='Enter') addCandidate()">
                <button class="btn-add" onclick="addCandidate()">+ Add</button>
            </div>
            <div id="candidate-preview"></div>
            <button class="btn-primary" onclick="startSession()">Start Session</button>
        </div>

        <!-- LEFT: Lobby (shown after session starts, replaces setup) -->
        <div class="panel" id="lobby-div">
            <span class="pin-label">Share this PIN with voters</span>
            <div class="pin-display" id="lobby-pin"></div>
            <button class="btn-reset" onclick="resetSession()">Reset Session</button>
        </div>

        <div id="panel-divider"></div>

        <!-- RIGHT: Voter Registration -->
        <div class="panel" id="registration-div">
            <h2>Register to Vote</h2>
            <input type="text" id="firstName" placeholder="First Name">
            <input type="text" id="lastName" placeholder="Last Name">
            <input type="password" id="pin" placeholder="Session PIN">
            <button class="btn-primary" onclick="registerVoter()">Register to Vote</button>
        </div>

    </div>

    <div id="feedback"></div>

    <!-- VOTING SCREEN -->
    <div id="candidate-list">
        {% for cand in candidates %}
        <button class="tile" onclick="castVote({{ cand.id }})">
            {{ cand.name }}
            <span class="vote-count">Votes: <span id="votes-{{ cand.id }}">{{ cand.votes }}</span></span>
        </button>
        {% endfor %}
    </div>

    <button id="undo-btn" onclick="undoVote()">Undo Last Vote</button>
    <button id="results-btn" onclick="showResults()">Show Results</button>
    <div id="timer"></div>
    <div id="results-output"></div>

    <script>
        /* ---- HOST SETUP ---- */
        let pendingCandidates = [];
        let voteTimer;

        function addCandidate() {
            const input = document.getElementById('candidate-name-input');
            const name = input.value.trim();
            if (!name) return;
            pendingCandidates.push(name);
            input.value = '';
            input.focus();
            renderCandidatePreview();
        }

        function removeCandidate(index) {
            pendingCandidates.splice(index, 1);
            renderCandidatePreview();
        }

        function renderCandidatePreview() {
            const container = document.getElementById('candidate-preview');
            container.innerHTML = pendingCandidates.map((name, i) =>
                `<div class="preview-item">
                    <span>${name}</span>
                    <button onclick="removeCandidate(${i})">&#x2715;</button>
                </div>`
            ).join('');
        }

        async function startSession() {
            const pin = document.getElementById('setup-pin').value.trim();
            if (!pin) return showFeedback("Set a session PIN first.", 'error');
            if (pendingCandidates.length === 0) return showFeedback("Add at least one candidate.", 'error');

            const response = await fetch('/setup', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({pin, candidates: pendingCandidates})
            });
            const data = await response.json();
            if (data.success) {
                window.location.reload();
            } else {
                showFeedback(data.message, 'error');
            }
        }

        async function resetSession() {
            await fetch('/reset', { method: 'POST' });
            window.location.reload();
        }

        /* ---- PAGE LOAD: if session already configured, swap setup for lobby with PIN ---- */
        window.addEventListener('DOMContentLoaded', async () => {
            const res = await fetch('/status');
            const data = await res.json();
            if (data.configured) {
                document.getElementById('setup-div').style.display = 'none';
                const lobbyDiv = document.getElementById('lobby-div');
                lobbyDiv.style.display = 'flex';
                document.getElementById('lobby-pin').textContent = data.pin;
            }
        });

        /* ---- EXISTING VOTING LOGIC ---- */
        let currentVoterId = null;

        function showFeedback(message, type) {
            const el = document.getElementById('feedback');
            el.textContent = message;
            el.className = type === 'success' ? 'feedback-success' : 'feedback-error';
        }

        function startVoteTimer(seconds = 30) {
            clearInterval(voteTimer);
            let timeLeft = seconds;
            const timerEl = document.getElementById('timer');
            timerEl.style.display = 'block';
            timerEl.textContent = `Time left to vote: ${timeLeft}s`;

            voteTimer = setInterval(() => {
                timeLeft--;
                timerEl.textContent = `Time left to vote: ${timeLeft}s`;

                if (timeLeft <= 0) {
                    clearInterval(voteTimer);
                    timerEl.textContent = "Voting time expired.";
                    showFeedback("Voting time expired.", 'error');
                }
            }, 1000);
        }

        async function registerVoter() {
            const first = document.getElementById('firstName').value.trim();
            const last = document.getElementById('lastName').value.trim();
            const pin = document.getElementById('pin').value;

            if (!first || !last || !pin) return showFeedback("Please fill in all fields.", 'error');

            const response = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({first, last, pin})
            });
            const data = await response.json();
            if (data.success) {
                currentVoterId = data.voter_id;
                document.getElementById('registration-div').style.display = 'none';
                document.getElementById('candidate-list').style.display = 'grid';
                document.getElementById('undo-btn').style.display = 'inline-block';
                document.getElementById('results-btn').style.display = 'inline-block';
                document.getElementById('landing').style.display = 'none';
                showFeedback(`Welcome! Your voter ID is ${currentVoterId}`, 'success');
                setInterval(updateResults, 2000);
                startVoteTimer();
            } else {
                showFeedback(data.message, 'error');
            }
        }

        async function castVote(id) {
            if (!currentVoterId) return showFeedback("Please register first!", 'error');
            if (document.getElementById('timer').textContent === "Voting time expired.") {
                return showFeedback("You can no longer vote.", 'error');
            }

            const response = await fetch('/vote', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({voter_id: currentVoterId, candidate_id: id})
            });
            const data = await response.json();
            if (data.success) {
                clearInterval(voteTimer);
                updateResults();
                showFeedback("Vote cast!", 'success');
            }
            else { showFeedback(data.message, 'error'); }
        }

        async function undoVote() {
            const response = await fetch('/undo', { method: 'POST' });
            const data = await response.json();
            if (data.success) { updateResults(); showFeedback(data.message, 'success'); }
            else { showFeedback(data.message, 'error'); }
        }

        async function updateResults() {
            const response = await fetch('/results');
            const data = await response.json();
            data.forEach(cand => {
                document.getElementById(`votes-${cand.id}`).innerText = cand.votes;
            });
        }

        async function showResults() {
            const response = await fetch('/results');
            const data = await response.json();

            let output = '';
            data.forEach(cand => {
                output += `${cand.name}: ${cand.votes} votes<br>`;
            });

            document.getElementById('results-output').innerHTML = output;
        }
    </script>
</body>
</html>
